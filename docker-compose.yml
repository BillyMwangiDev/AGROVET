version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agrovet}
      POSTGRES_USER: ${POSTGRES_USER:-agrovet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agrovet_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agrovet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: agrovet.settings.production
      DATABASE_URL: postgres://${POSTGRES_USER:-agrovet}:${POSTGRES_PASSWORD:-agrovet_pass}@db:5432/${POSTGRES_DB:-agrovet}
    volumes:
      - media_files:/app/media
      - static_files:/app/static
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn agrovet.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/dist:/usr/share/nginx/html:ro
      - static_files:/app/static:ro
      - media_files:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  media_files:
  static_files:
