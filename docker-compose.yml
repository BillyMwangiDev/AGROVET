version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agrovet}
      POSTGRES_USER: ${POSTGRES_USER:-agrovet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agrovet_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agrovet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: agrovet.settings.production
      DB_NAME: ${POSTGRES_DB:-agrovet}
      DB_USER: ${POSTGRES_USER:-agrovet}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-agrovet_pass}
      DB_HOST: db
      DB_PORT: "5432"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-nicmah.co.ke,www.nicmah.co.ke}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://nicmah.co.ke,http://www.nicmah.co.ke}
    volumes:
      - media_files:/app/media
      - static_files:/app/static
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn agrovet.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
      args:
        # Default placeholder values for the build, can be overridden by .env
        VITE_API_URL: /api
        VITE_WHATSAPP_PHONE: "254726476128"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_files:/app/static:ro
      - media_files:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  media_files:
  static_files:
