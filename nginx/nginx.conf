# ── Rate-limit zones ──────────────────────────────────────────────────────────
# auth_limit: strict zone for login / pin-verify / signup (5 req/min per IP)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
# api_limit: general API zone (60 req/min per IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

upstream django {
    server web:8000;
}

server {
    listen 80;
    # Replace with your actual domain before deploying to production.
    # Example: server_name nicmah.co.ke www.nicmah.co.ke;
    server_name nicmah.co.ke www.nicmah.co.ke;

    # ── When SSL cert is active, uncomment this and remove other content ──
    # return 301 https://$host$request_uri;

    client_max_body_size 10M;

    # ── Security headers (set on every response) ──────────────────────────
    # HSTS: tell browsers to use HTTPS only for 1 year (enable after SSL is live)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: adjust connect-src if you add third-party APIs
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self'; font-src 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Auth endpoints — strict rate limit ────────────────────────────────
    location ~ ^/api/auth/(token|pin-verify|signup)/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── General API ───────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Django admin ──────────────────────────────────────────────────────
    location /admin/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Django collected static files ─────────────────────────────────────
    location /static/ {
        alias /app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── User-uploaded media ───────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── React SPA (catch-all) ─────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

